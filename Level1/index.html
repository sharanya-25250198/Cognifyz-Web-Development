<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Level 1 Task</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h1>Cognifyz Internship</h1>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <h2>Welcome to My Web Development Project</h2>

        <p>
            This webpage is created for Cognifyz Technologies Internship Level 1 Task.
        </p>

        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085"
             alt="Web Development">

    </section>

    <!-- Form -->
    <section class="form-section">

        <h2>Contact Form</h2>

        <form>

            <input type="text" placeholder="Enter your name">

            <button type="submit">Submit</button>

        </form>

    </section>

    <!-- JavaScript Task -->
    <section class="js-section">

        <h2>JavaScript Tasks</h2>

        <!-- Color Change Button -->
        <button id="colorBtn">
            Change My Color
        </button>

        <!-- Greeting Button -->
        <button onclick="showGreeting()">
            Show Greeting
        </button>

        <!-- Calculator -->
        <div class="calculator">

            <input type="number" id="num1" placeholder="First Number">

            <input type="number" id="num2" placeholder="Second Number">

            <button onclick="calculateSum()">
                Add Numbers
            </button>

            <h3 id="result"></h3>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
